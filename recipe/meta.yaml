{% set name = "pycron" %}
{% set version = "3.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: e125a28aca0295769541a40633f70b602579df48c9cb357c36c28d2628ba2b13

build:
  noarch: python
  number: 0
  script: "{{ PYTHON }} -m pip install . -vv"

requirements:
  host:
    - python {{ python_min }}
    - pip
    - poetry-core
  run:
    - python >={{ python_min }},<3.13

test:
  imports:
    - pycron
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - pip check

about:
  home: https://github.com/kipe/pycron
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: 'Simple cron-like parser, which determines if current datetime matches conditions.'
  dev_url: https://github.com/kipe/pycron

extra:
  recipe-maintainers:
    - synapticarbors
